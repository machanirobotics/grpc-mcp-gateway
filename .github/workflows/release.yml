name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate tag matches semver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag $TAG does not match semver pattern v*.*.*"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "VERSION_SEMVER=${TAG#v}" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          go test -race ./...
          cd plugin && go test -race ./...
          cd ../examples && go test -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            output="protoc-gen-mcp-${VERSION}-${GOOS}-${GOARCH}${ext}"
            echo "Building $output..."
            GOOS=$GOOS GOARCH=$GOARCH go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${output}" \
              ./plugin/cmd/protoc-gen-mcp/
          done

      - name: Create archives
        run: |
          cd dist
          for f in protoc-gen-mcp-*; do
            if echo "$f" | grep -q windows; then
              zip "${f%.*}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|%h" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s|%h" "${PREV_TAG}..HEAD")
          fi

          NEW="" UPDATED="" FIXED="" OTHER=""
          while IFS='|' read -r msg hash; do
            [ -z "$msg" ] && continue
            lower=$(echo "$msg" | tr '[:upper:]' '[:lower:]')
            case "$lower" in
              feat:*|feat\(*|add:*|add\ *)   NEW="${NEW}- ${msg} (\`${hash}\`)\n" ;;
              fix:*|fix\(*|bug:*|bugfix:*)    FIXED="${FIXED}- ${msg} (\`${hash}\`)\n" ;;
              refactor:*|refactor\(*|chore:*|chore\(*|docs:*|docs\(*|ci:*|ci\(*|style:*|perf:*|build:*)
                                              UPDATED="${UPDATED}- ${msg} (\`${hash}\`)\n" ;;
              *)                              OTHER="${OTHER}- ${msg} (\`${hash}\`)\n" ;;
            esac
          done <<< "$COMMITS"

          {
            echo "CHANGELOG<<EOF"
            [ -n "$NEW" ]     && printf "#### New\n${NEW}\n"
            [ -n "$UPDATED" ] && printf "#### Updated\n${UPDATED}\n"
            [ -n "$FIXED" ]   && printf "#### Bug Fixes\n${FIXED}\n"
            [ -n "$OTHER" ]   && printf "#### Other\n${OTHER}\n"
            [ -z "$NEW$UPDATED$FIXED$OTHER" ] && echo "Initial release"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Buf CLI
        uses: bufbuild/buf-setup-action@v1

      - name: Push proto module to BSR
        run: cd proto && buf push --label "$VERSION"
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          body: |
            ## grpc-mcp-gateway ${{ env.VERSION }}

            ### Installation

            **Go install (plugin):**
            ```bash
            go install github.com/machanirobotics/grpc-mcp-gateway/plugin/cmd/protoc-gen-mcp@${{ env.VERSION }}
            ```

            **Python (pre-compiled proto types):**
            ```bash
            pip install grpc-mcp-gateway-protos==${{ env.VERSION_SEMVER }}
            ```

            **Rust (pre-compiled proto types):**
            ```toml
            [dependencies]
            mcp-protobuf = "${{ env.VERSION_SEMVER }}"
            ```

            **TypeScript / Node (pre-compiled proto types):**
            ```bash
            npm install @machanirobotics/grpc-mcp-gateway-protos@${{ env.VERSION_SEMVER }}
            ```

            **Download binary:**
            Download the archive for your platform below, extract it, and place `protoc-gen-mcp` in your `$PATH`.

            The version is baked into the binary via `-ldflags` and will appear in all generated file headers:
            ```
            protoc-gen-mcp --version
            # protoc-gen-mcp ${{ env.VERSION }}
            ```

            ### Checksums
            See `checksums.txt` for SHA-256 hashes of all archives.

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: false
          draft: false
          prerelease: false

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" mcp/protobuf/python/pyproject.toml

      - name: Build package
        run: |
          pip install build
          cd mcp/protobuf/python && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp/protobuf/python/dist/

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.93.0

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" mcp/protobuf/rust/Cargo.toml

      - name: Publish to crates.io
        working-directory: mcp/protobuf/rust
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' mcp/protobuf/typescript/package.json

      - uses: oven-sh/setup-bun@v2

      - name: Install & verify (Bun)
        working-directory: mcp/protobuf/typescript
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run lint

      # Trusted publishing (OIDC): Bun does not support npm OIDC yet; npm publish only here. Node 24+ / npm 11.5.1+.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm (npm CLI for OIDC)
        working-directory: mcp/protobuf/typescript
        run: npm publish --access public

  update-docs:
    name: Sync protobuf package versions & docs
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@1.93.0

      - uses: astral-sh/setup-uv@v7

      - uses: oven-sh/setup-bun@v2

      - name: Bump package versions and README pins
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Syncing protobuf packages and docs to $VERSION (from tag ${{ github.ref_name }})"

          # Published package manifests (stay aligned with GitHub release / PyPI / crates.io / npm)
          sed -i 's/^version = .*/version = "'"$VERSION"'"/' mcp/protobuf/python/pyproject.toml
          sed -i 's/^version = "[^"]*"/version = "'"$VERSION"'"/' mcp/protobuf/rust/Cargo.toml
          sed -i 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' mcp/protobuf/typescript/package.json

          # Root README — Cargo.toml example, PyPI pin, npm pin, cargo add pin
          sed -i 's/mcp-protobuf = "[^"]*"/mcp-protobuf = "'"$VERSION"'"/' README.md
          sed -i 's/grpc-mcp-gateway-protos==[0-9][0-9.]*/grpc-mcp-gateway-protos=='"$VERSION"'/g' README.md
          sed -i 's/@machanirobotics\/grpc-mcp-gateway-protos@[0-9][0-9.]*/@machanirobotics\/grpc-mcp-gateway-protos@'"$VERSION"'/g' README.md
          sed -i 's/cargo add mcp-protobuf@[0-9][0-9.]*/cargo add mcp-protobuf@'"$VERSION"'/g' README.md

          # Python package README
          sed -i 's/grpc-mcp-gateway-protos==[0-9][0-9.]*/grpc-mcp-gateway-protos=='"$VERSION"'/g' mcp/protobuf/python/README.md

          # Rust package README
          sed -i 's/mcp-protobuf = "[^"]*"/mcp-protobuf = "'"$VERSION"'"/' mcp/protobuf/rust/README.md

          # TypeScript package README
          sed -i 's/@machanirobotics\/grpc-mcp-gateway-protos@[0-9][0-9.]*/@machanirobotics\/grpc-mcp-gateway-protos@'"$VERSION"'/g' mcp/protobuf/typescript/README.md

      - name: Refresh lockfiles
        run: |
          (cd mcp/protobuf/python && uv lock)
          # Refresh only lock metadata for the bumped crate version (avoid full resolve churn from generate-lockfile)
          (cd mcp/protobuf/rust && cargo check)
          (cd mcp/protobuf/typescript && bun install)

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            mcp/protobuf/python/pyproject.toml \
            mcp/protobuf/python/uv.lock \
            mcp/protobuf/python/README.md \
            mcp/protobuf/rust/Cargo.toml \
            mcp/protobuf/rust/Cargo.lock \
            mcp/protobuf/rust/README.md \
            mcp/protobuf/typescript/package.json \
            mcp/protobuf/typescript/bun.lock \
            mcp/protobuf/typescript/README.md
          if git diff --staged --quiet; then
            echo "No version or doc changes needed"
          else
            git commit -m "chore: sync protobuf package versions for ${{ github.ref_name }}"
            git push
          fi
